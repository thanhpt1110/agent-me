# Configuration for `release-drafter/release-drafter`, run from
# `.github/workflows/release-drafter.yml`. The action keeps a
# *draft* GitHub Release continuously up to date with a changelog
# generated from merged PRs and their labels. A maintainer publishes
# the draft (and creates the matching tag) when cutting a release.
#
# Doc: https://github.com/release-drafter/release-drafter

# --- Naming --------------------------------------------------------------

# `$RESOLVED_VERSION` is computed by the `version-resolver` block
# below, based on labels of the PRs since the previous release tag.
name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

# --- Header / footer wrap each draft release. Keep terse тАФ readers scan.

header: |
  Phase / progress notes for this release. See `STATE.md` for
  current development phase.

footer: |
  ---
  Generated by Release Drafter. Edit before publishing if you want a
  human-curated summary above the auto-generated PR list.

# --- Categories -----------------------------------------------------------
# Group merged PRs in the release notes by their labels. A PR with
# multiple matching labels appears in the FIRST matching category
# (top-down), so order matters: security before bug, bug before chore,
# etc. PRs with no matching label go under "Other changes" by default.
#
# Emoji are intentional here тАФ they render in the GitHub release UI
# and act as visual section anchors. (Labels themselves stay
# emoji-free; see CONTRIBUTING.md.)
categories:
  - title: "ЁЯЪА Features"
    labels: ["feature", "enhancement"]
  - title: "ЁЯРЫ Bug fixes"
    labels: ["bug", "fix"]
  - title: "ЁЯФТ Security"
    labels: ["security"]
  - title: "ЁЯУЭ Documentation"
    labels: ["docs", "documentation"]
  - title: "ЁЯз░ Maintenance"
    labels: ["chore", "ci", "dependencies"]
  - title: "ЁЯзк Tests"
    labels: ["tests", "test"]
  - title: "ЁЯПЧя╕П Refactor"
    labels: ["refactor"]

# --- Version resolver ----------------------------------------------------
# Decides whether the next release is major / minor / patch based on
# the labels seen in merged PRs. Highest match wins (major > minor >
# patch). If nothing matches, falls back to `default`.
#
# Convention:
#   - `major` / `breaking` тЖТ bump major
#   - `minor` / `feature` / `enhancement` тЖТ bump minor
#   - everything else (bug, chore, docs, tests, ci, deps, refactor) тЖТ
#     bump patch
version-resolver:
  major:
    labels: ["major", "breaking"]
  minor:
    labels: ["minor", "feature", "enhancement"]
  patch:
    labels: ["patch", "bug", "fix", "chore", "docs", "tests", "ci",
             "dependencies", "refactor"]
  default: patch

# --- Body template -------------------------------------------------------
# `$CHANGES` expands to the categorized PR list above; `$CONTRIBUTORS`
# expands to the list of merged-PR authors with @-mentions.
template: |
  ## What changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
