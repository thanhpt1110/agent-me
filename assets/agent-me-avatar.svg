<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">agent-me avatar</title>
  <desc id="desc">A text-free NVIDIA-green autonomous AI robot avatar with circuit and web3 styling.</desc>
  <defs>
    <linearGradient id="bg" x1="124" y1="76" x2="900" y2="948" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111711"/>
      <stop offset=".48" stop-color="#050805"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="green" x1="192" y1="160" x2="832" y2="864" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cfff40"/>
      <stop offset=".45" stop-color="#76b900"/>
      <stop offset="1" stop-color="#3f8500"/>
    </linearGradient>
    <linearGradient id="visor" x1="318" y1="404" x2="706" y2="514" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eaffba"/>
      <stop offset=".5" stop-color="#76b900"/>
      <stop offset="1" stop-color="#265600"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#cfff40" stop-opacity=".95"/>
      <stop offset=".48" stop-color="#76b900" stop-opacity=".48"/>
      <stop offset="1" stop-color="#76b900" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-24%" y="-24%" width="148%" height="148%">
