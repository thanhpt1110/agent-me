      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.462 0 0 0 0 0.725 0 0 0 0 0 0 0 0 .62 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="squircle">
      <rect x="48" y="48" width="928" height="928" rx="220"/>
    </clipPath>
  </defs>

