<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}agent-me dashboard{% endblock %}</title>

  <script>
    (function () {
      const key = "agent-me.theme.v1";
      const root = document.documentElement;
      const media = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;

      function storedTheme() {
        try {
          const value = localStorage.getItem(key);
          return value === "light" || value === "dark" ? value : "";
        } catch (_) {
          return "";
        }
      }

      function systemTheme() {
        return media && media.matches ? "dark" : "light";
      }

      function updateButtons(theme) {
        document.querySelectorAll("[data-theme-toggle]").forEach((button) => {
          const next = theme === "dark" ? "light" : "dark";
          button.setAttribute("aria-label", `Switch to ${next} theme`);
          button.setAttribute("title", `Switch to ${next} theme`);
          const icon = button.querySelector("[data-theme-toggle-icon]");
          const label = button.querySelector("[data-theme-toggle-label]");
          if (icon) icon.textContent = theme === "dark" ? "☾" : "☀";
          if (label) label.textContent = theme === "dark" ? "Dark" : "Light";
        });
      }

      function applyTheme(theme, persist) {
        const next = theme === "dark" ? "dark" : "light";
        root.dataset.theme = next;
        root.classList.toggle("dark", next === "dark");
        root.classList.toggle("theme-dark", next === "dark");
        root.classList.toggle("theme-light", next === "light");
        root.style.colorScheme = next;
        if (persist) {
          try { localStorage.setItem(key, next); } catch (_) {}
        }
        updateButtons(next);
      }

      function currentTheme() {
        return root.dataset.theme || storedTheme() || systemTheme();
      }

      window.agentMeTheme = {
        apply: applyTheme,
        current: currentTheme,
        reset() {
          try { localStorage.removeItem(key); } catch (_) {}
          applyTheme(systemTheme(), false);
        },
        toggle() {
          applyTheme(currentTheme() === "dark" ? "light" : "dark", true);
        },
      };

      applyTheme(storedTheme() || systemTheme(), false);

      if (media && media.addEventListener) {
        media.addEventListener("change", () => {
          if (!storedTheme()) applyTheme(systemTheme(), false);
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        updateButtons(currentTheme());
        document.querySelectorAll("[data-theme-toggle]").forEach((button) => {
          button.addEventListener("click", () => window.agentMeTheme.toggle());
        });
      });
    })();
  </script>

  <!-- Tailwind via CDN keeps the draft zero-build. Switch to compiled
       Tailwind once the layout settles. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Official NVIDIA brand palette (black + green) sourced from
    // api.nth.nvidia.com colormap.css. `ink.*` and `accent.*` are kept as
    // aliases so every existing template re-themes without per-file edits.
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            nvgreen: {
              100: "#cfff40",
              200: "#a5de15",
              300: "#76b900",
              500: "#549a00",
              700: "#3f8500",
              900: "#265600",
            },
            nvgray: {
              50:  "#eeeeee",
              100: "#cccccc",
              200: "#a7a7a7",
              300: "#898989",
              500: "#4b4b4b",
              700: "#313131",
              800: "#222222",
              900: "#1a1a1a",
              950: "#0a0a0a",
            },
            ink: {
              950: "#000000",
              900: "#0a0a0a",
              800: "#1a1a1a",
              700: "#313131",
              600: "#4b4b4b",
            },
            accent: {
              400: "#76b900",
              500: "#549a00",
              600: "#3f8500",
            },
          },
          fontFamily: {
            mono: ["JetBrains Mono", "ui-monospace", "monospace"],
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="/static/app.css" />
  <link rel="icon" type="image/svg+xml" href="/static/agent-me-avatar.svg" />
  <link rel="apple-touch-icon" href="/static/agent-me-avatar-512.png" />
  <script>
    window.agentMeOperatorAccess = {
      key: "agent-me.operator-token.v1",
      token() {
        try { return localStorage.getItem(this.key) || ""; } catch { return ""; }
      },
      headers(extra = {}) {
        const headers = { ...extra };
        const token = this.token();
        if (token) headers["X-Agent-Me-Operator-Token"] = token;
        return headers;
      },
      remember(response) {
        const token = response.headers.get("X-Agent-Me-Operator-Token");
        if (!token) return;
        try { localStorage.setItem(this.key, token); } catch {}
      },
      forget() {
        try { localStorage.removeItem(this.key); } catch {}
      },
    };
  </script>
</head>
<body class="h-full bg-ink-950 text-slate-200 font-sans antialiased">
  <div class="min-h-full">
    {% include "partials/nav.html" %}

    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      {% block content %}{% endblock %}
    </main>

    <footer class="mx-auto max-w-7xl px-4 py-6 text-xs text-slate-500">
      <div class="grid gap-3 border-t border-ink-800 pt-4 sm:grid-cols-2">
        <div>
          <div class="font-semibold text-slate-300">Agent Me</div>
          <div>Built by Thanh Phan · thaphan@nvidia.com</div>
        </div>
        <div class="sm:text-right">
          <div class="font-semibold text-slate-300">NVIDIA VRDC SWQA</div>
          {% set release = dashboard_release_info() %}
          <div>
            Last Update
            <a class="font-semibold text-slate-300 hover:text-accent-400"
               href="{{ release.url }}">{{ release.tag }}</a>:
            {{ release.date }}
          </div>
        </div>
      </div>
    </footer>
  </div>

  {% block scripts %}{% endblock %}
  <!-- Alpine.js for sprinkled reactivity (SSE wiring, refresh state).
       Load after page scripts so x-data factories exist before Alpine starts. -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
