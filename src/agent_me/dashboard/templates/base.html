<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}agent-me dashboard{% endblock %}</title>

  <!-- Tailwind via CDN keeps the draft zero-build. Switch to compiled
       Tailwind once the layout settles. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Official NVIDIA brand palette (black + green) sourced from
    // api.nth.nvidia.com colormap.css. `ink.*` and `accent.*` are kept as
    // aliases so every existing template re-themes without per-file edits.
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            nvgreen: {
              100: "#cfff40",
              200: "#a5de15",
              300: "#76b900",
              500: "#549a00",
              700: "#3f8500",
              900: "#265600",
            },
            nvgray: {
              50:  "#eeeeee",
              100: "#cccccc",
              200: "#a7a7a7",
              300: "#898989",
              500: "#4b4b4b",
              700: "#313131",
              800: "#222222",
              900: "#1a1a1a",
              950: "#0a0a0a",
            },
            ink: {
              950: "#000000",
              900: "#0a0a0a",
              800: "#1a1a1a",
              700: "#313131",
              600: "#4b4b4b",
            },
            accent: {
              400: "#76b900",
              500: "#549a00",
              600: "#3f8500",
            },
          },
          fontFamily: {
            mono: ["JetBrains Mono", "ui-monospace", "monospace"],
          },
        },
      },
    };
  </script>

  <!-- Alpine.js for sprinkled reactivity (SSE wiring, refresh state). -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <link rel="stylesheet" href="/static/app.css" />
  <link rel="icon" type="image/svg+xml" href="/static/agent-me-avatar.svg" />
  <link rel="apple-touch-icon" href="/static/agent-me-avatar-512.png" />
</head>
<body class="h-full bg-ink-950 text-slate-200 font-sans antialiased dark">
  <div class="min-h-full">
    {% include "partials/nav.html" %}

    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      {% block content %}{% endblock %}
    </main>

    <footer class="mx-auto max-w-7xl px-4 py-6 text-xs text-slate-500">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <span>agent-me · Phase 4 · NVIDIA-themed · read-only over bridge state.db + brief output</span>
        <span><a class="hover:text-accent-400" href="https://github.com/thanhpt1110/agent-me">repo</a> · <a class="hover:text-accent-400" href="/healthz">healthz</a></span>
      </div>
    </footer>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
