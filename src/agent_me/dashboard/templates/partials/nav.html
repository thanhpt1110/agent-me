<nav class="border-b border-ink-700 bg-ink-900/80 backdrop-blur sticky top-0 z-30">
  <div class="mx-auto max-w-7xl px-3 sm:px-6 lg:px-8">
    <div class="flex h-14 items-center justify-between gap-3">
      <a href="/" class="flex items-center gap-2 text-slate-100 font-semibold shrink-0">
        <img src="/static/agent-me-avatar.svg" alt="" class="h-8 w-8 rounded-lg bg-ink-950 ring-1 ring-accent-400/50" />
        <span class="hidden sm:inline">agent-me</span>
        <span class="hidden lg:inline text-xs font-mono px-1.5 py-0.5 rounded bg-ink-700 text-slate-400">dashboard</span>
      </a>

      <!-- Scroll-x on phones so all 9 nav items remain reachable without
           a hamburger menu. Each pill stays touch-target sized. -->
      <div class="flex items-center gap-1 text-sm overflow-x-auto -mx-1 px-1
                  scrollbar-thin">
        <a href="/"
           class="px-3 py-1.5 rounded shrink-0 hover:bg-ink-700 {% if request.url.path == '/' %}bg-ink-700 text-slate-100{% else %}text-slate-300{% endif %}">
          Overview
        </a>
        {% for src_id, label, icon in sources %}
        <a href="/source/{{ src_id }}"
           class="px-3 py-1.5 rounded shrink-0 hover:bg-ink-700 {% if request.url.path == '/source/' + src_id %}bg-ink-700 text-slate-100{% else %}text-slate-300{% endif %}">
          <span aria-hidden="true">{{ icon }}</span>
          <span class="hidden md:inline">{{ label }}</span>
          <span class="md:hidden sr-only">{{ label }}</span>
        </a>
        {% endfor %}
        <a href="/logs"
           class="px-3 py-1.5 rounded shrink-0 hover:bg-ink-700 {% if request.url.path == '/logs' %}bg-ink-700 text-slate-100{% else %}text-slate-300{% endif %}">
          <span aria-hidden="true">📜</span>
          <span class="hidden sm:inline">Logs</span>
        </a>
        <a href="/auto-sfa"
           class="px-3 py-1.5 rounded shrink-0 hover:bg-ink-700 {% if request.url.path == '/auto-sfa' %}bg-ink-700 text-slate-100{% else %}text-slate-300{% endif %}">
          Auto SFA
        </a>
        <a href="/ops"
           class="px-3 py-1.5 rounded shrink-0 hover:bg-ink-700 {% if request.url.path == '/ops' %}bg-ink-700 text-slate-100{% else %}text-slate-300{% endif %}">
          <span aria-hidden="true">⚙</span>
          <span class="hidden sm:inline">Ops</span>
        </a>
      </div>
    </div>
  </div>
</nav>
